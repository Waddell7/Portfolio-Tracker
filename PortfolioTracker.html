                    >Import {toImport.length} holding{toImport.length!==1?'s':''}</button>
                </div>
            </div>
        </div>
    );
};

const DividendModal = ({ holding, divF, setDivF, onClose, onSubmit, title='Record Dividend' }) => {
    if (!holding) return null;
    const isNonAUD = holding.purchaseCurrency && holding.purchaseCurrency !== 'AUD';
    const sym = symOf(holding.purchaseCurrency||'AUD');
    const netAmt = (divF.quantity||0) * ((divF.amountPerUnit||0)/100) * (isNonAUD && divF.exchangeRate > 0 ? (1/divF.exchangeRate) : 1);
    const divisor = 1 - ((divF.frankedPct||0)/100) * 0.30;
    const gross = divisor > 0 ? netAmt / divisor : netAmt;
    const fc = gross * ((divF.frankedPct||0)/100) * 0.30;
    const net = netAmt;
    return (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
            <div className="bg-slate-900 rounded-xl border border-slate-700/80 w-full max-w-sm p-6">
                <h3 className="text-lg font-bold mb-1">{title}</h3>
                <p className="text-xs text-slate-500 mb-5">{holding.tickerDisplay || holding.ticker}</p>
                <div className="space-y-4">
                    <div>
                        <label className="block text-xs text-slate-400 mb-1.5 uppercase tracking-wide">Date Paid</label>
                        <input type="date" value={divF.date} onChange={e=>setDivF({...divF,date:e.target.value})} max={new Date().toISOString().split('T')[0]} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-white focus:outline-none text-sm"/>
                    </div>
                    <div>
                        <label className="block text-xs text-slate-400 mb-1.5 uppercase tracking-wide">Amount per unit — cents ({holding.purchaseCurrency==='AUD'?'AU¢':holding.purchaseCurrency+'¢'})</label>
                        <input type="number" value={divF.amountPerUnit||''} onChange={e=>setDivF({...divF,amountPerUnit:parseFloat(e.target.value)||0})} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-white focus:outline-none text-sm" step="0.0001" placeholder="e.g. 103.8469"/>
                    </div>
                    <div>
                        <label className="block text-xs text-slate-400 mb-1.5 uppercase tracking-wide">Units held on date</label>
                        <input type="number" value={divF.quantity||''} onChange={e=>setDivF({...divF,quantity:parseFloat(e.target.value)||0})} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-white focus:outline-none text-sm" step="0.0001"/>
                    </div>
                    <div>
                        <label className="block text-xs text-slate-400 mb-1.5 uppercase tracking-wide">Franking % <span className="text-slate-600 normal-case">(0 = unfranked, 100 = fully franked)</span></label>
                        <input type="number" value={divF.frankedPct||''} onChange={e=>setDivF({...divF,frankedPct:parseFloat(e.target.value)||0})} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-white focus:outline-none text-sm" min="0" max="100" step="1"/>
                    </div>
                    {isNonAUD && (
                        <div>
                            <label className="block text-xs text-slate-400 mb-1.5 uppercase tracking-wide">AUD/{holding.purchaseCurrency} rate on payment date <span className="text-slate-600 normal-case">(e.g. 0.65)</span></label>
                            <input type="number" value={divF.exchangeRate||''} onChange={e=>setDivF({...divF,exchangeRate:parseFloat(e.target.value)||0})} className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-white focus:outline-none text-sm" step="0.0001"/>
                        </div>
                    )}
                    {gross > 0 && (
                        <div className="bg-slate-800 rounded-lg p-3 text-sm space-y-1">
                            <div><span className="text-slate-400">Gross payment: </span><span className="font-semibold text-white">${gross.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
                            {fc > 0 && <div><span className="text-slate-400">Franking credits: </span><span className="font-semibold text-white">${fc.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>}
                            <div><span className="text-slate-400">Net payment (cash): </span><span className="font-semibold text-emerald-400">${net.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
                        </div>
                    )}
                </div>
                <div className="flex gap-3 mt-6">
                    <button onClick={onClose} className="flex-1 px-4 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm">Cancel</button>
                    <button onClick={onSubmit} className="flex-1 px-4 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-lg text-sm font-semibold">{title}</button>
                </div>
            </div>
        </div>
    );
};

// ---- Main ----
const App=()=>{
    const [holdings,setHoldings]=useState(()=>{try{const s=localStorage.getItem(STORAGE_KEY);return s?JSON.parse(s):[];}catch(e){return[];}});
    const [prices,setPrices]=useState({});
    const [lastP,setLastP]=useState({});
    const [rates,setRates]=useState(MOCK_RATES);
    const [loading,setLoading]=useState(false);
    const [updated,setUpdated]=useState(new Date());
    const [modal,setModal]=useState(false);
    const [sellModal,setSellModal]=useState(false);
    const [sellId,setSellId]=useState(null);
    const [editSaleModal,setEditSaleModal]=useState(false);
    const [editSaleHoldingId,setEditSaleHoldingId]=useState(null);
    const [editSaleIndex,setEditSaleIndex]=useState(null);
    const [divModal,setDivModal]=useState(false);
    const [divHoldingId,setDivHoldingId]=useState(null);
    const [editDivModal,setEditDivModal]=useState(false);
    const [editDivHoldingId,setEditDivHoldingId]=useState(null);
    const [editDivIndex,setEditDivIndex]=useState(null);
    const [divF,setDivF]=useState({date:new Date().toISOString().split('T')[0],amountPerUnit:0,quantity:0,frankedPct:0,exchangeRate:0});
    const [editId,setEditId]=useState(null);
    const [srch,setSrch]=useState([]);
    const [form,setForm]=useState(blank());
    const [sellF,setSellF]=useState({quantity:0,salePrice:0,saleDate:new Date().toISOString().split('T')[0],saleExchangeRate:0});
    const [expanded,setExpanded]=useState(new Set());
    const [salesExpanded,setSalesExpanded]=useState(new Set());
    const [divExpanded,setDivExpanded]=useState(new Set());
    const [divSort,setDivSort]=useState({col:null,dir:'desc'});
    const [benchmark,setBenchmark]=useState(null);
    const [benchmarkData,setBenchmarkData]=useState([]);
    const [sort,setSort]=useState({col:null,dir:'desc'});
    const [salesSort,setSalesSort]=useState({col:null,dir:'desc'});
    const [importReview,setImportReview]=useState(null); // null or array of rows being reviewed
    // For form: user-facing AUD/currency rate (e.g. 0.645 for AUDUSD)
    const [fxInput,setFxInput]=useState('');

    useEffect(()=>{try{localStorage.setItem(STORAGE_KEY,JSON.stringify(holdings));}catch(e){};},[holdings]);

    const refresh=useCallback(async()=>{
        setLoading(true);
        try{
            const[sp,cp,rd]=await Promise.all([fetchStocks(holdings),fetchCrypto(holdings),fetchRates()]);
            const all={...sp,...cp};setPrices(all);setLastP(p=>({...p,...all}));setRates(rd.rates||MOCK_RATES);setUpdated(new Date());
        }catch(e){console.error(e);}finally{setLoading(false);}
    },[holdings]);

    useEffect(()=>{refresh();const t=setInterval(refresh,5*60*1000);return()=>clearInterval(t);},[refresh]);

    const allP=useMemo(()=>({...lastP,...prices}),[prices,lastP]);
    const stats=useMemo(()=>calcStats(holdings,allP,rates),[holdings,allP,rates]);
    const asBD=useMemo(()=>calcAB(holdings,allP,rates),[holdings,allP,rates]);
    const geoBD=useMemo(()=>calcGB(holdings,allP,rates),[holdings,allP,rates]);
    const [hist, setHist] = useState([]);
    useEffect(() => {
        let cancelled = false;
        genHist(holdings, allP, rates).then(h => { if (!cancelled) setHist(h); }).catch(e => console.error('genHist error:', e));
        return () => { cancelled = true; };
    }, [holdings, allP, rates]);
    useEffect(()=>{
        if(!benchmark||!holdings.length){setBenchmarkData([]);return;}
        let cancelled=false;
        const earliest=holdings.reduce((e,h)=>h.purchaseDate<e?h.purchaseDate:e,new Date().toISOString().split('T')[0]);
        const pad=n=>String(n).padStart(2,'0');
        const now=new Date();
        // Always fetch at least 14 months back (covers 1Y filter + buffer)
        const yFrom=new Date(now);yFrom.setMonth(now.getMonth()-14);
        // Also go back 2 months before earliest holding for MAX timeframe
        const holdFrom=new Date(earliest+'T00:00:00');holdFrom.setMonth(holdFrom.getMonth()-2);
        // Use whichever is earlier, capped at 6 years to avoid huge requests
        const maxBack=new Date(now);maxBack.setFullYear(now.getFullYear()-6);
        const fromD=holdFrom<yFrom?holdFrom:yFrom;
        if(fromD<maxBack)fromD.setTime(maxBack.getTime());
        const fromDate=`${fromD.getFullYear()}-${pad(fromD.getMonth()+1)}-${pad(fromD.getDate())}`;
        (async()=>{
            try{
                if(benchmark==='ASX200'){
                    const map=await fetchHistoricalPrices('^AXJO','',fromDate);
                    if(!cancelled&&map) setBenchmarkData(Object.entries(map).map(([date,price])=>({date,priceAUD:price})).sort((a,b)=>a.date.localeCompare(b.date)));
                } else if(benchmark==='SP500'){
                    const [priceMap,fxMap]=await Promise.all([
                        fetchHistoricalPrices('^GSPC','',fromDate),
                        fetchHistoricalFX('USD',fromDate)
                    ]);
                    if(!cancelled&&priceMap){
                        const entries=Object.entries(priceMap).map(([date,price])=>{
                            let fx=rates['USD']||1.54;
                            if(fxMap){let cd=new Date(date+'T12:00:00Z');if(!isNaN(cd.getTime())){for(let b=0;b<=5;b++){const s=cd.toISOString().split('T')[0];if(fxMap[s]!=null){fx=fxMap[s];break;}cd.setDate(cd.getDate()-1);}}}
                            return{date,priceAUD:price*fx};
                        }).sort((a,b)=>a.date.localeCompare(b.date));
                        setBenchmarkData(entries);
                    }
                }
            }catch(e){console.error('Benchmark fetch error:',e);}
        })();
        return()=>{cancelled=true;};
    },[benchmark,holdings]);
    const groups=useMemo(()=>groupH(holdings,allP,rates),[holdings,allP,rates]);
    const salesGroups=useMemo(()=>groupS(holdings,rates),[holdings,rates]);
    const divRows=useMemo(()=>groupD(holdings,rates),[holdings,rates]);

    const sf=(k,v)=>setForm(p=>({...p,[k]:v}));

    const srchF=async(q)=>{sf('ticker',q.toUpperCase());if(q.length>=2){const r=await searchT(q);setSrch(r);}else setSrch([]);};
    const selR=(r)=>{
        const at=r.type==='ETF'?'ETF':r.type==='CRYPTOCURRENCY'?'CRYPTOCURRENCY':'STOCK';
        const ex=r.exchange==='Unknown'?'':r.exchange;
        setForm(p=>({...p,ticker:r.ticker,tickerDisplay:r.name,assetType:at,exchange:ex,geographicExposure:defGeo(at,ex)}));
        setSrch([]);
    };

    const openAdd=()=>{setEditId(null);setForm(blank());setFxInput('');setSrch([]);setModal(true);};
    const openEdit=(id)=>{
        const h=holdings.find(x=>x.id===id);if(!h) return;
        setForm({...h,geographicExposure:h.geographicExposure||defGeo(h.assetType,h.exchange)});
        // Convert stored rate back to AUD/currency format for display
        setFxInput(h.purchaseExchangeRate&&h.purchaseCurrency!=='AUD'?(1/h.purchaseExchangeRate).toFixed(4):'');
        setEditId(id);setModal(true);
    };

    const submit=()=>{
        if(!form.ticker||!form.quantity||!form.purchasePrice){alert('Fill in ticker, quantity, and price');return;}
        let per=null;
        if(form.purchaseCurrency==='AUD'){
            per=1;
        }else if(fxInput&&parseFloat(fxInput)>0){
            // user entered AUD/currency (e.g. 0.645 for AUDUSD)
            // store as AUD per 1 foreign = 1/fxInput
            per=1/parseFloat(fxInput);
        }else{
            // fallback to current rate
            per=rates[form.purchaseCurrency]||1;
        }
        const h={...form,purchaseExchangeRate:per};
        if(editId) setHoldings(hs=>hs.map(x=>x.id===editId?h:x));
        else setHoldings(hs=>[...hs,h]);
        setModal(false);setForm(blank());setFxInput('');setTimeout(refresh,500);
    };

    const delH=(id)=>{if(window.confirm('Delete this holding?'))setHoldings(hs=>hs.filter(x=>x.id!==id));};
    const sellClick=(id)=>{
        const h=holdings.find(x=>x.id===id);
        const liveRate = h?.purchaseCurrency === 'AUD' ? 1 : (rates[h?.purchaseCurrency] || 0);
        // rates[currency] = AUD per 1 foreign unit (e.g. 1.54 AUD per USD)
        // Form shows AUD/foreign = 1/liveRate (e.g. 0.65 USD per AUD)
        const defaultRate = liveRate > 0 ? parseFloat((1/liveRate).toFixed(4)) : 0;
        setSellId(id);
        setSellF({quantity:0,salePrice:0,saleDate:new Date().toISOString().split('T')[0],saleExchangeRate:defaultRate});
        setSellModal(true);
    };
    const openEditSale=(holdingId,saleIndex,sale)=>{
        setEditSaleHoldingId(holdingId);
        setEditSaleIndex(saleIndex);
        // saleExchangeRate stored as AUD per 1 foreign (e.g. 1.54). Form shows AUD/foreign (e.g. 0.65).
        const displayRate = sale.saleExchangeRate > 0 ? parseFloat((1/sale.saleExchangeRate).toFixed(4)) : 0;
        setSellF({quantity:sale.quantity,salePrice:sale.salePrice,saleDate:sale.saleDate,saleExchangeRate:displayRate});
        setEditSaleModal(true);
    };
    const editSaleSub=()=>{
        if(!sellF.quantity||!sellF.salePrice){alert('Fill in quantity and price');return;}
        const h=holdings.find(x=>x.id===editSaleHoldingId);
        if(!h){setEditSaleModal(false);return;}
        // Remaining = effQty + the original qty of this sale (so we can re-validate)
        const origSaleQty=(h.sales||[])[editSaleIndex]?.quantity||0;
        const remaining=effQty(h)+origSaleQty;
        if(sellF.quantity>remaining+1e-9){alert(`Cannot sell more than ${fmtQ(remaining,h.assetType)} available`);return;}
        const isNonAUD = h.purchaseCurrency && h.purchaseCurrency !== 'AUD';
        if(isNonAUD && (!sellF.saleExchangeRate || sellF.saleExchangeRate <= 0)){
            alert(`Please enter the AUD/${h.purchaseCurrency} exchange rate at the time of sale`);return;
        }
        const saleExchangeRate = isNonAUD ? (1/sellF.saleExchangeRate) : 1;
        const updatedSale={quantity:sellF.quantity,salePrice:sellF.salePrice,saleDate:sellF.saleDate,saleExchangeRate};
        setHoldings(hs=>hs.map(x=>{
            if(x.id!==editSaleHoldingId) return x;
            const newSales=[...(x.sales||[])];
            newSales[editSaleIndex]=updatedSale;
            return{...x,sales:newSales};
        }));
        setEditSaleModal(false);setEditSaleHoldingId(null);setEditSaleIndex(null);
    };
    const sellSub=()=>{
        if(!sellF.quantity||!sellF.salePrice){alert('Fill in quantity and price');return;}
        const h=holdings.find(x=>x.id===sellId);
        if(!h){setSellModal(false);return;}
        const remaining=effQty(h);
        if(sellF.quantity>remaining+1e-9){alert(`Cannot sell more than ${fmtQ(remaining,h.assetType)} remaining`);return;}
        const isNonAUD = h.purchaseCurrency && h.purchaseCurrency !== 'AUD';
        if(isNonAUD && (!sellF.saleExchangeRate || sellF.saleExchangeRate <= 0)){
            alert(`Please enter the AUD/${h.purchaseCurrency} exchange rate at the time of sale`);return;
        }
        // Use user-entered rate for non-AUD. For AUD holdings, rate is 1.
        // Store as AUD per 1 foreign unit (inverted from the AUD/currency form input).
        const saleExchangeRate = isNonAUD ? (1/sellF.saleExchangeRate) : 1;
        const newSale={quantity:sellF.quantity,salePrice:sellF.salePrice,saleDate:sellF.saleDate,saleExchangeRate};
        setHoldings(hs=>hs.map(x=>x.id===sellId?{...x,sales:[...(x.sales||[]),newSale]}:x));
        setSellModal(false);setSellId(null);
    };
    const delSale=(holdingId,saleIndex)=>{
        if(!window.confirm('Delete this sale? The units will return to the holding.'))return;
        setHoldings(hs=>hs.map(h=>h.id!==holdingId?h:{...h,sales:(h.sales||[]).filter((_,i)=>i!==saleIndex)}));
    };
    const divClick=(id)=>{
        const h=holdings.find(x=>x.id===id);
        const liveRate=h?.purchaseCurrency==='AUD'?1:(rates[h?.purchaseCurrency]||0);
        const defaultRate=liveRate>0?parseFloat((1/liveRate).toFixed(4)):0;
        const qty=effQty(h)||h?.quantity||0;
        setDivHoldingId(id);
        setDivF({date:new Date().toISOString().split('T')[0],amountPerUnit:0,quantity:qty,frankedPct:0,exchangeRate:defaultRate});
        setDivModal(true);
    };
    const divSub=()=>{
        if(!divF.amountPerUnit||!divF.quantity){alert('Fill in amount per unit and quantity');return;}
        const h=holdings.find(x=>x.id===divHoldingId);
        if(!h){setDivModal(false);return;}
        const isNonAUD=h.purchaseCurrency&&h.purchaseCurrency!=='AUD';
        if(isNonAUD&&(!divF.exchangeRate||divF.exchangeRate<=0)){alert(`Please enter the AUD/${h.purchaseCurrency} exchange rate`);return;}
        const newDiv={date:divF.date,amountPerUnit:(divF.amountPerUnit||0)/100,quantity:divF.quantity,frankedPct:divF.frankedPct||0,currency:h.purchaseCurrency,exchangeRate:divF.exchangeRate||0};
        setHoldings(hs=>hs.map(x=>x.id===divHoldingId?{...x,dividends:[...(x.dividends||[]),newDiv]}:x));
        setDivModal(false);setDivHoldingId(null);
    };
    const openEditDiv=(holdingId,divIndex,div)=>{
        const h=holdings.find(x=>x.id===holdingId);
        const displayRate=div.exchangeRate>0?parseFloat((1/div.exchangeRate).toFixed(4)):0;
        setEditDivHoldingId(holdingId);setEditDivIndex(divIndex);
        setDivF({date:div.date,amountPerUnit:(div.amountPerUnit||0)*100,quantity:div.quantity,frankedPct:div.frankedPct||0,exchangeRate:div.exchangeRate>0?displayRate:0});
        setEditDivModal(true);
    };
    const editDivSub=()=>{
        if(!divF.amountPerUnit||!divF.quantity){alert('Fill in amount per unit and quantity');return;}
        const h=holdings.find(x=>x.id===editDivHoldingId);
        if(!h){setEditDivModal(false);return;}
        const updatedDiv={date:divF.date,amountPerUnit:(divF.amountPerUnit||0)/100,quantity:divF.quantity,frankedPct:divF.frankedPct||0,currency:h.purchaseCurrency,exchangeRate:divF.exchangeRate>0?(1/divF.exchangeRate):0};

                            <div className="border-t border-slate-800 pt-4">
                                <div className="flex items-center justify-between">
                                    <label className="text-xs text-slate-400 uppercase tracking-wide">Purchased on margin?</label>
                                    <button type="button" onClick={()=>sf('onMargin',!form.onMargin)}
                                        style={{width:'40px',height:'22px',borderRadius:'11px',border:'none',cursor:'pointer',transition:'background 0.2s',background:form.onMargin?'#10b981':'#334155',position:'relative'}}>
                                        <div style={{position:'absolute',top:'3px',left:form.onMargin?'21px':'3px',width:'16px',height:'16px',borderRadius:'50%',background:'#fff',transition:'left 0.2s'}}/>
                                    </button>
                                </div>
                                {form.onMargin&&(()=>{
                                    const fullVal=(form.quantity||0)*(form.purchasePrice||0);
                                    const marginPct=parseFloat(form.marginPct)||0;
                                    const deposit=fullVal*(marginPct/100);
                                    return(
                                        <div className="mt-3 space-y-3">
                                            <div>
                                                <label className="block text-xs text-slate-400 mb-1.5 uppercase tracking-wide">Margin Rate (%)</label>
                                                <input type="number" min="1" max="100" value={form.marginPct||''} onChange={e=>sf('marginPct',parseFloat(e.target.value)||0)}
                                                    className="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-blue-500 text-sm" placeholder="e.g. 20"/>
                                            </div>
                                            {marginPct>0&&fullVal>0&&(
                                                <div className="bg-slate-800/60 rounded-lg p-3 text-xs space-y-1">
                                                    <div className="flex justify-between"><span className="text-slate-400">Full contract value:</span><span className="text-white">{symOf(form.purchaseCurrency)}{fullVal.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
                                                    <div className="flex justify-between"><span className="text-slate-400">Your margin deposit ({marginPct}%):</span><span className="text-emerald-400 font-semibold">{symOf(form.purchaseCurrency)}{deposit.toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
                                                    <div className="flex justify-between"><span className="text-slate-400">Broker funds:</span><span className="text-slate-300">{symOf(form.purchaseCurrency)}{(fullVal-deposit).toLocaleString('en-AU',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })()}
                            </div>
                            {form.assetType==='ETF'&&(
                                <div className="border-t border-slate-800 pt-4">
                                    <div className="flex justify-between mb-3"><label className="text-xs text-slate-400 uppercase tracking-wide">Geographic Exposure</label><span className={`text-xs font-semibold ${Math.abs(gt-100)<0.5?'text-emerald-400':'text-red-400'}`}>{gt.toFixed(0)}%</span></div>
                                    <div className="grid grid-cols-5 gap-2">
                                        {['us','aus','eu','asia','other'].map(r=>(
                                            <div key={r}><label className="block text-xs text-slate-600 mb-1 text-center uppercase">{r}</label>
                                            <input type="number" min="0" max="100" value={form.geographicExposure?.[r]||0} onChange={e=>sf('geographicExposure',{...form.geographicExposure,[r]:parseFloat(e.target.value)||0})} className="w-full bg-slate-800 border border-slate-700 rounded px-2 py-1.5 text-white text-xs text-center focus:outline-none focus:border-blue-500"/></div>
                                        ))}
                                    </div>
                                    {Math.abs(gt-100)>0.5&&gt>0&&<p className="text-xs text-orange-400 mt-2">⚠️ Exposures total {gt.toFixed(1)}% — leave at 0 if unknown</p>}
                                </div>
                            )}
                        </div>
                        <div className="flex gap-3 mt-6">
                            <button onClick={()=>{setModal(false);setSrch([]);}} className="flex-1 px-4 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm">Cancel</button>
                            <button onClick={submit} className="flex-1 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-semibold">{editId?'Update':'Add Holding'}</button>
                        </div>
                    </div>
                </div>
            )}

            {/* Sell Modal */}
            {sellModal && sellId && <SellModal holding={holdings.find(x=>x.id===sellId)} sellF={sellF} setSellF={setSellF} onClose={()=>setSellModal(false)} onSubmit={sellSub} fmtQ={fmtQ}/>}
            {editSaleModal && editSaleHoldingId && <SellModal holding={holdings.find(x=>x.id===editSaleHoldingId)} sellF={sellF} setSellF={setSellF} onClose={()=>setEditSaleModal(false)} onSubmit={editSaleSub} fmtQ={fmtQ} title="Edit Sale"/>}
            {divModal && divHoldingId && <DividendModal holding={holdings.find(x=>x.id===divHoldingId)} divF={divF} setDivF={setDivF} onClose={()=>setDivModal(false)} onSubmit={divSub}/>}
            {editDivModal && editDivHoldingId && <DividendModal holding={holdings.find(x=>x.id===editDivHoldingId)} divF={divF} setDivF={setDivF} onClose={()=>setEditDivModal(false)} onSubmit={editDivSub} title="Edit Dividend"/>}
            {importReview && <ImportReviewModal
                importRows={importReview}
                setImportRows={setImportReview}
                existingHoldings={holdings}
                onClose={()=>setImportReview(null)}
                onConfirm={async(rows)=>{
                    const withNewIds=rows.map(h=>{
                        const {_skip,...rest}=h;
                        return{...rest,
                            tickerDisplay:rest.ticker,
                            id:Date.now().toString(36)+Math.random().toString(36).slice(2)
                        };
                    });
                    // Immediately resolve proper display names from Yahoo Finance search
                    const named=await Promise.all(withNewIds.map(async h=>{
                        try{
                            const results=await searchT(h.ticker);
                            const match=results.find(r=>r.ticker===h.ticker||r.ticker===yTicker(h.ticker,h.exchange));
                            if(match&&match.name) return{...h,tickerDisplay:match.name};
                        }catch(e){}
                        return h;
                    }));
                    setHoldings(cur=>[...cur,...named]);
                    setImportReview(null);
                }}
            />}

            {/* Footer */}
            <div style={{marginTop:'48px',paddingTop:'16px',borderTop:'1px solid #1e293b',textAlign:'center',fontSize:'11px',color:'#334155'}}>
                © {new Date().getFullYear()} Portfolio Tracker. Licensed under the GNU GPL v3.0.
            </div>
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
